<!DOCTYPE html>
<html>

<head>
<title>Your Cart</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#34495e;
color:white;
padding:15px;
text-align:center;
}

.cart-container{
padding:20px;
max-width:800px;
margin:auto;
}

ul{
list-style:none;
padding:0;
}

li{
background:white;
margin-bottom:12px;
padding:12px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
display:flex;
align-items:center;
justify-content:space-between;
}

.book{
display:flex;
align-items:center;
gap:15px;
}

.book img{
width:50px;
height:70px;
object-fit:cover;
border-radius:4px;
}

.book-info{
font-size:16px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

.remove-btn:hover{
background:#c0392b;
}

.total{
font-size:20px;
margin-top:15px;
}

.buttons{
margin-top:20px;
}

.pay-btn{
padding:10px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

.clear-btn{
padding:10px 20px;
background:#e74c3c;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.shop-btn{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

.empty{
color:#777;
font-size:18px;
}

</style>

</head>

<body>

<header>
<h1>Your Cart</h1>
</header>

<div class="cart-container">

<h2>Selected Books</h2>

<ul id="cartItems"></ul>

<h3 id="totalPrice" class="total"></h3>

<div class="buttons">

<button class="shop-btn" onclick="continueShopping()">
Continue Shopping
</button>

<button class="clear-btn" onclick="clearCart()">
Clear Cart
</button>

<a href="payment.html">
<button class="pay-btn">
Proceed to Payment
</button>
</a>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart(){

let cartList = document.getElementById("cartItems");
let totalPrice = document.getElementById("totalPrice");

cartList.innerHTML = "";

let total = 0;

if(cart.length === 0){

cartList.innerHTML = "<p class='empty'>Your cart is empty</p>";
totalPrice.innerHTML = "";
return;

}

cart.forEach((item,index)=>{

let li = document.createElement("li");

li.innerHTML = `
<div class="book">
<img src="${item.image || 'images/default.jpg'}">
<span class="book-info">${item.name} - ₹${item.price}</span>
</div>

<button class="remove-btn" onclick="removeItem(${index})">
Remove
</button>
`;

cartList.appendChild(li);

total += item.price;

});

totalPrice.innerHTML = "Total Price: ₹" + total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}

function clearCart(){

localStorage.removeItem("cart");

cart = [];

loadCart();

}

function continueShopping(){

window.location.href = "index.html";

}

loadCart();

</script>

</body>

</html>
