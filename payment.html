<!DOCTYPE html>
<html>

<head>
<title>Payment</title>
<link rel="stylesheet" href="css/style.css">

<style>

.payment-container{
padding:30px;
max-width:500px;
margin:auto;
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.qr-box{
text-align:center;
margin-top:20px;
}

.qr-box img{
width:200px;
}

</style>

</head>

<body>

<header>
<h1 style="padding:15px;">Payment Page</h1>
</header>

<div class="payment-container">

<h2>Select Payment Method</h2>

<hr>

<h3>UPI Payment</h3>

<label>Enter UPI ID</label>
<input type="text" placeholder="example@upi">

<button onclick="paymentSuccess()">Pay with UPI</button>

<hr>

<h3>Scan UPI QR Code</h3>

<div class="qr-box">

<p>Scan with Google Pay / PhonePe / Paytm</p>

<img src="images/upi-qr.png">

<br><br>

<button onclick="paymentSuccess()">I Have Paid</button>

</div>

<hr>

<h3>Card Payment</h3>

<label>Name on Card</label>
<input type="text" placeholder="Enter Name">

<label>Card Number</label>
<input type="text" placeholder="1234 5678 9012 3456">

<label>Expiry Date</label>
<input type="text" placeholder="MM/YY">

<label>CVV</label>
<input type="password" placeholder="123">

<button onclick="paymentSuccess()">Pay with Card</button>

</div>

<script src="js/script.js"></script>

</body>

</html>
