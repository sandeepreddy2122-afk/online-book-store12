<!DOCTYPE html>
<html>

<head>
<title>Create Account</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background-image:url("images/bg.jpg");
background-size:cover;
background-position:center;
}

.box{
background:rgba(255,255,255,0.9);
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

.box input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

.box button{
width:100%;
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="text" id="newUser" placeholder="Create User ID">

<input type="password" id="newPass" placeholder="Create Password">

<button onclick="registerUser()">Register</button>

<p>Already have account? <a href="login.html">Login</a></p>

</div>

<script src="js/script.js"></script>

</body>

</html>
